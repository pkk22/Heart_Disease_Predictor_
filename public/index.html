<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { background-color: #e63946; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 20px; }
        #result { margin-top: 20px; padding: 15px; font-weight: bold; text-align: center; display: none; }
        .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <h2>❤️ Heart Disease Prediction System</h2>
    <form id="predictionForm">
        <div class="form-group"><label>Age</label><input type="number" id="age" value="50" required></div>
        <div class="form-group">
            <label>Sex</label>
            <select id="sex"><option value="1">Male</option><option value="0">Female</option></select>
        </div>
        <div class="form-group">
            <label>Chest Pain Type (cp)</label>
            <select id="cp"><option value="0">0: Typical Angina</option><option value="1">1: Atypical Angina</option><option value="2">2: Non-anginal</option><option value="3">3: Asymptomatic</option></select>
        </div>
        <div class="form-group"><label>Resting Blood Pressure (trestbps)</label><input type="number" id="trestbps" value="120" required></div>
        <div class="form-group"><label>Serum Cholesterol (chol)</label><input type="number" id="chol" value="200" required></div>
        <div class="form-group">
            <label>Fasting Blood Sugar > 120 mg/dl (fbs)</label>
            <select id="fbs"><option value="0">False</option><option value="1">True</option></select>
        </div>
        <div class="form-group"><label>Resting Electrocardiographic (restecg)</label><input type="number" id="restecg" value="0" required></div>
        <div class="form-group"><label>Maximum Heart Rate (thalach)</label><input type="number" id="thalach" value="150" required></div>
        <div class="form-group">
            <label>Exercise Induced Angina (exang)</label>
            <select id="exang"><option value="0">No</option><option value="1">Yes</option></select>
        </div>
        <div class="form-group"><label>ST Depression (oldpeak)</label><input type="number" step="0.1" id="oldpeak" value="1.0" required></div>
        <div class="form-group"><label>Slope of Peak Exercise (slope)</label><input type="number" id="slope" value="1" required></div>
        <div class="form-group"><label>Major Vessels Colored (ca)</label><input type="number" id="ca" value="0" required></div>
        <div class="form-group"><label>Thalassemia (thal)</label><input type="number" id="thal" value="1" required></div>
        
        <button type="submit">Predict Health Status</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'none';

            const payload = {
                age: parseFloat(document.getElementById('age').value),
                sex: parseFloat(document.getElementById('sex').value),
                cp: parseFloat(document.getElementById('cp').value),
                trestbps: parseFloat(document.getElementById('trestbps').value),
                chol: parseFloat(document.getElementById('chol').value),
                fbs: parseFloat(document.getElementById('fbs').value),
                restecg: parseFloat(document.getElementById('restecg').value),
                thalach: parseFloat(document.getElementById('thalach').value),
                exang: parseFloat(document.getElementById('exang').value),
                oldpeak: parseFloat(document.getElementById('oldpeak').value),
                slope: parseFloat(document.getElementById('slope').value),
                ca: parseFloat(document.getElementById('ca').value),
                thal: parseFloat(document.getElementById('thal').value)
            };

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                resultDiv.style.display = 'block';
                if (data.prediction === 1) {
                    resultDiv.className = 'danger';
                    resultDiv.innerText = '🚨 Prediction: The person is likely to have a defective heart.';
                } else {
                    resultDiv.className = 'success';
                    resultDiv.innerText = '✅ Prediction: The person is healthy.';
                }
            } catch (err) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'danger';
                resultDiv.innerText = 'Error connecting to the machine learning server.';
            }
        });
    </script>
</body>
</html>
